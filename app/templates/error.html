{% extends "base.html" %}

{% block title %}Error - TeleHost{% endblock %}

{% block content %}
<div class="glass-card error-card" style="max-width: 500px; width: 100%;">
    <div class="error-icon">⚠️</div>
    <h1 class="error-title">{% if error_title %}{{ error_title }}{% else %}Link Inactive{% endif %}</h1>
    <p class="lead" style="margin-bottom: 2rem; font-size: 1.05rem; color: var(--text-secondary);">
        {{ error_message }}
    </p>
    
    <div style="max-width: 220px; margin: 0 auto;">
        <a href="/" class="btn-primary">
            🏠 Return Home
        </a>
    </div>
</div>
{% endblock %}
